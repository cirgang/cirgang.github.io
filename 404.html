<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>404 - Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --accent: #2563eb;
      --bg: #002330;
      --text: #ffffff;
      --muted: #6b7280;
      --card: #f9fafb;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;

      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .contact-card {
      background: #011b24;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 36px;
      max-width: 500px;
      width: 90%;
      text-align: center;

      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 5rem;
      margin: 0;
      letter-spacing: 2px;
    }

    h2 {
      margin: 12px 0 8px;
      font-weight: 500;
    }

    p {
      color: var(--muted);
      margin-bottom: 24px;
    }



    .button-red {
      background: #dc2626; /* red */
      display: inline-block;
      padding: 10px 18px;
      border-radius: 8px;
      color: white;
      font-weight: 500;
      text-decoration: none;
      transition: 0.2s ease;
    }

    .button-blue {
      background: #2563eb; /* blue */
      display: inline-block;
      padding: 10px 18px;
      border-radius: 8px;
      color: white;
      font-weight: 500;
      text-decoration: none;
      transition: 0.2s ease;
    }

    .button:hover {
      opacity: 0.9;
    }

    .subtle-link {
      display: block;
      margin-top: 14px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .subtle-link:hover {
      color: var(--accent);
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 3.5rem;
      }
    }
  </style>
</head>

<body>
  <div class="contact-card">
    <h1>404</h1>
    <h2>Page not found</h2>
    <p>
      The page you’re looking for doesn’t exist or may have been moved.
    </p>

    <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" class="button-red" color="Red">Red Pill</a>
    <a href="/" class="button-blue" color="Blue">Blue Pill</a>
  </div>
</body>
</html>
